<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Rahat-AI Crop Manager{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green-deep: #0d3b2e;
      --green-mid: #1a6b4a;
      --green-bright: #2ecc71;
      --green-glow: #39ff8b;
      --earth: #8b5e3c;
      --gold: #f0c040;
      --cream: #f5f0e8;
      --dark: #0a0f0d;
      --card-bg: #111a14;
      --border: rgba(46,204,113,0.15);
      --text-muted: #7a9e8a;
      --sidebar-w: 260px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--dark);
      color: var(--cream);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: fixed; top: 0; left: 0;
      width: var(--sidebar-w); height: 100vh;
      background: #0c1810;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 100;
      transition: transform 0.3s ease;
    }

    .sidebar-logo {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo .logo-mark {
      display: flex; align-items: center; gap: 12px;
    }
    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--green-mid), var(--green-bright));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .logo-text { line-height: 1.1; }
    .logo-text strong {
      display: block; font-size: 16px; font-weight: 800;
      color: var(--green-bright); letter-spacing: -0.3px;
    }
    .logo-text span {
      font-size: 10px; color: var(--text-muted);
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 1px; text-transform: uppercase;
    }

    .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
    .nav-section-label {
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-muted); padding: 12px 12px 6px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .nav-item { margin-bottom: 2px; }
    .nav-link {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: 10px;
      color: var(--text-muted); text-decoration: none;
      font-size: 13.5px; font-weight: 500;
      transition: all 0.2s ease; position: relative;
    }
    .nav-link .nav-icon {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px; font-size: 14px;
      background: rgba(255,255,255,0.04);
      transition: all 0.2s ease;
    }
    .nav-link:hover {
      color: var(--cream); background: rgba(46,204,113,0.07);
    }
    .nav-link:hover .nav-icon { background: rgba(46,204,113,0.15); }
    .nav-link.active {
      color: var(--green-bright);
      background: rgba(46,204,113,0.1);
    }
    .nav-link.active .nav-icon {
      background: rgba(46,204,113,0.2);
      color: var(--green-bright);
    }
    .nav-link.active::before {
      content: '';
      position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 3px; height: 20px;
      background: var(--green-bright);
      border-radius: 0 3px 3px 0;
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }
    .api-status {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text-muted);
      font-family: 'IBM Plex Mono', monospace;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green-bright);
      box-shadow: 0 0 6px var(--green-bright);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── MAIN CONTENT ── */
    .main-content {
      margin-left: var(--sidebar-w);
      min-height: 100vh;
      padding: 32px;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px;
    }
    .page-title h1 {
      font-size: 26px; font-weight: 800; letter-spacing: -0.5px;
      color: var(--cream);
    }
    .page-title p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .topbar-actions { display: flex; gap: 10px; }

    /* ── CARDS ── */
    .glass-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      transition: border-color 0.2s;
    }
    .glass-card:hover { border-color: rgba(46,204,113,0.3); }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .stat-icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .stat-value { font-size: 26px; font-weight: 800; line-height: 1; }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* ── BUTTONS ── */
    .btn-green {
      background: linear-gradient(135deg, var(--green-mid), var(--green-bright));
      color: #fff; border: none; padding: 12px 28px;
      border-radius: 10px; font-weight: 600; font-size: 14px;
      cursor: pointer; transition: all 0.2s;
      font-family: 'Sora', sans-serif;
    }
    .btn-green:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(46,204,113,0.3);
    }
    .btn-outline-green {
      background: transparent;
      border: 1px solid var(--green-bright);
      color: var(--green-bright);
      padding: 10px 22px; border-radius: 10px;
      font-weight: 500; font-size: 13px; cursor: pointer;
      transition: all 0.2s; font-family: 'Sora', sans-serif;
    }
    .btn-outline-green:hover {
      background: rgba(46,204,113,0.1);
    }

    /* ── FORM ELEMENTS ── */
    .form-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .form-control, .form-select {
      background: #0c1810; border: 1px solid var(--border);
      color: var(--cream); border-radius: 10px; padding: 11px 14px;
      font-family: 'Sora', sans-serif; font-size: 14px;
    }
    .form-control:focus, .form-select:focus {
      background: #0c1810; color: var(--cream);
      border-color: var(--green-bright);
      box-shadow: 0 0 0 3px rgba(46,204,113,0.1);
    }
    .form-control::placeholder { color: var(--text-muted); }
    .form-select option { background: #0c1810; }

    /* ── BADGE ── */
    .badge-green { background: rgba(46,204,113,0.15); color: var(--green-bright); border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 600; }
    .badge-red { background: rgba(231,76,60,0.15); color: #e74c3c; border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 600; }
    .badge-yellow { background: rgba(240,192,64,0.15); color: var(--gold); border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 600; }

    /* ── LOADING SPINNER ── */
    .spinner-green {
      width: 36px; height: 36px;
      border: 3px solid rgba(46,204,113,0.2);
      border-top-color: var(--green-bright);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESULT CARD ── */
    .result-section { display: none; }
    .result-section.show { display: block; }

    /* ── MOBILE ── */
    .mobile-toggle {
      display: none; position: fixed; top: 16px; left: 16px;
      z-index: 200; background: var(--green-mid); border: none;
      color: #fff; width: 40px; height: 40px; border-radius: 8px;
      font-size: 16px; cursor: pointer;
    }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; padding: 20px; padding-top: 70px; }
      .mobile-toggle { display: flex; align-items: center; justify-content: center; }
    }

    /* ── ANIMATIONS ── */
    .fade-up {
      animation: fadeUp 0.4s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── PROGRESS BAR ── */
    .progress-bar-green {
      height: 6px; background: rgba(46,204,113,0.15);
      border-radius: 10px; overflow: hidden;
    }
    .progress-bar-green .fill {
      height: 100%; background: linear-gradient(90deg, var(--green-mid), var(--green-bright));
      border-radius: 10px; transition: width 0.8s ease;
    }

    /* ── TOAST ── */
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
    .toast-msg {
      background: #1a2e1f; border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 20px;
      font-size: 13px; color: var(--cream);
      display: flex; align-items: center; gap: 10px;
      animation: slideInRight 0.3s ease;
      margin-top: 8px;
    }
    @keyframes slideInRight {
      from { transform: translateX(60px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<button class="mobile-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <div class="logo-icon">🌱</div>
      <div class="logo-text">
        <strong>Rahat-AI</strong>
        <span>Crop Manager v1.0</span>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-label">Overview</div>
    <div class="nav-item">
      <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
        <div class="nav-icon"><i class="fas fa-th-large"></i></div>
        Dashboard
      </a>
    </div>

    <div class="nav-section-label" style="margin-top:8px;">Tomato Tools</div>
    <div class="nav-item">
      <a href="/disease" class="nav-link {% if request.path == '/disease' %}active{% endif %}">
        <div class="nav-icon"><i class="fas fa-microscope"></i></div>
        Disease Detection
      </a>
    </div>
    <div class="nav-item">
      <a href="/price" class="nav-link {% if request.path == '/price' %}active{% endif %}">
        <div class="nav-icon"><i class="fas fa-chart-line"></i></div>
        Price Forecast
      </a>
    </div>

    <div class="nav-section-label" style="margin-top:8px;">Farm Intelligence</div>
    <div class="nav-item">
      <a href="/crop" class="nav-link {% if request.path == '/crop' %}active{% endif %}">
        <div class="nav-icon"><i class="fas fa-seedling"></i></div>
        Crop Recommender
      </a>
    </div>
    <div class="nav-item">
      <a href="/fertilizer" class="nav-link {% if request.path == '/fertilizer' %}active{% endif %}">
        <div class="nav-icon"><i class="fas fa-flask"></i></div>
        Fertilizer AI
      </a>
    </div>
    <div class="nav-item">
      <a href="/weather" class="nav-link {% if request.path == '/weather' %}active{% endif %}">
        <div class="nav-icon"><i class="fas fa-cloud-sun"></i></div>
        Weather & Advisory
      </a>
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="api-status">
      <div class="status-dot"></div>
      <span>All systems operational</span>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main-content">
  {% block content %}{% endblock %}
</main>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}
function showToast(msg, type = 'success') {
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  const el = document.createElement('div');
  el.className = 'toast-msg';
  el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
function setLoading(btnId, loading, text = 'Analyze') {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading
    ? `<span class="spinner-border spinner-border-sm me-2"></span>Processing...`
    : text;
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
